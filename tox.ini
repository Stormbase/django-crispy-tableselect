[tox]
skipsdist = True
usedevelop = True


envlist =
    py{310,311,312,313}-django52
    py{312,313,314}-django60

[testenv]
allowlist_externals = sh
install_command = sh scripts/install_tox.sh {opts} {packages}

commands = pytest --cov --cov-report=xml -vv {posargs}

basepython =
    py310: python3.10
    py311: python3.11
    py312: python3.12
    py313: python3.13
    py314: python3.14

deps =
    hatch
    django52: django~=5.2.0
    django60: django~=6.0.0

[testenv:crispymain]
deps =
  git+https://github.com/django-crispy-forms/django-crispy-forms.git

[testenv:tables2main]
deps =
  git+https://github.com/jieter/django-tables2
