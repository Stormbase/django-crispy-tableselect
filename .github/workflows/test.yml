name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:  # Allow this workflow to be called by other workflows, e.g. publish.yml

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v6
      with:
        python-version: 3.14
    
    - name: Install dependencies
      run: pip install -e .[testing]

    - name: Run make format
      run: make format

  testing:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: true
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        experimental: [false]
        toxenv: ["py"]
        include:
          # Test against future django-crispy-forms. Allowed to fail.
          - python: "3.14"
            toxenv: crispymain
            experimental: true
          # Test against future django-tables2. Allowed to fail.
          - python: "3.14"
            toxenv: tables2main
            experimental: true
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
           python-version: '${{ matrix.python }}'
           cache: "pip"

      - uses: gerlero/apt-install@f4fa5265092af9e750549565d28c99aec7189639
        name: Install gettext
        with:
          packages: gettext

      - name: Install dependencies
        run: |
          python -m pip install .[testing] tox coverage

      - name: Compile translations
        run: /bin/sh ./compile_translations.sh

      - name: Run tox targets for Python ${{ matrix.python }}
        run: |
          # Run only the tox environments that match the Python version
          tox run -f py$(echo ${{ matrix.python }} | tr -d .)
          coverage combine || true
          coverage report
          # Codecov does not support the .coverage file generated by coverage, so we convert it to xml
          coverage xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Stormbase/django-crispy-tableselect
